<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agentic MM-RAG: Unified Agentic Evidence Retrieval</title>
  <desc id="desc">A four-stage architecture showing offline multimodal ingestion, typed retrieval tools, agentic orchestration, progressive evidence state, and heterogeneous model collaboration.</desc>
